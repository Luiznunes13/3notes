services:
  medmanu:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./medmanu.db:/app/medmanu.db
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      # aponta para o Ollama já rodando no host
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
